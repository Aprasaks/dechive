services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: dechive_test
      POSTGRES_USER: dechive
      POSTGRES_PASSWORD: dechive_local_only
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dechive -d dechive_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - dechive_postgres_data:/var/lib/postgresql/data
  media-volume:
    image: alpine:3.22
    command: ["sh", "-c", "mkdir -p /data/media && tail -f /dev/null"]
    volumes:
      - ${MEDIA_LOCAL_HOST_ROOT:-./.data/media}:/data/media

volumes:
  dechive_postgres_data:
